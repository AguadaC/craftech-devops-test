version: "3.8"

services:
  db:
    image: postgres:12.0-alpine
    container_name: database
    env_file:
      - ./backend/.env.postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: backend
    env_file:
      - ./backend/.env.backend
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    environment:
      - HOST=0.0.0.0
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
